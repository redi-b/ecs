name: ecs

x-app-defaults: &app-defaults
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  security_opt:
    - no-new-privileges:true

x-platform-environment: &platform-environment
  NODE_ENV: production
  SERVICE_NAME: platform-api
  PORT: "3000"
  PLATFORM_DATABASE_URL: ${PLATFORM_DATABASE_URL:?set PLATFORM_DATABASE_URL}
  PLATFORM_DATABASE_SSL: ${PLATFORM_DATABASE_SSL:-false}
  # Same Postgres instance as Medusa; needed for demo-seed order backdating (SQL).
  MEDUSA_DATABASE_URL: ${MEDUSA_DATABASE_URL:?set MEDUSA_DATABASE_URL}
  MEDUSA_DATABASE_SSL: ${MEDUSA_DATABASE_SSL:-false}
  REDIS_URL: redis://redis:6379
  MEDUSA_INTERNAL_URL: http://medusa:9000
  MEDUSA_ADMIN_API_TOKEN: ${MEDUSA_ADMIN_API_TOKEN:-}
  PLATFORM_INTERNAL_API_TOKEN: ${PLATFORM_INTERNAL_API_TOKEN:?set PLATFORM_INTERNAL_API_TOKEN}
  PLATFORM_PUBLIC_BASE_URL: https://api.${BASE_DOMAIN:?set BASE_DOMAIN}
  STOREFRONT_PUBLIC_BASE_DOMAIN: ${BASE_DOMAIN}
  DASHBOARD_PUBLIC_BASE_URL: https://dashboard.${BASE_DOMAIN}
  BETTER_AUTH_URL: https://api.${BASE_DOMAIN}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET}
  BETTER_AUTH_COOKIE_DOMAIN: .${BASE_DOMAIN}
  BETTER_AUTH_COOKIE_PREFIX: ${BETTER_AUTH_COOKIE_PREFIX:-ecs}
  BETTER_AUTH_TRUSTED_ORIGINS: https://dashboard.${BASE_DOMAIN},https://*.${BASE_DOMAIN}
  MEDIA_STORAGE_PROVIDER: s3
  MEDIA_S3_ENDPOINT: ${MEDIA_S3_ENDPOINT:-https://media.${BASE_DOMAIN}}
  MEDIA_S3_REGION: ${MEDIA_S3_REGION:-us-east-1}
  MEDIA_S3_BUCKET: ${MINIO_BUCKET:-ecs-media}
  MEDIA_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-ecs}
  MEDIA_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
  MEDIA_S3_PUBLIC_BASE_URL: ${MEDIA_S3_PUBLIC_BASE_URL:-https://media.${BASE_DOMAIN}/${MINIO_BUCKET:-ecs-media}}
  MEDIA_S3_FORCE_PATH_STYLE: "true"
  MEDIA_UPLOAD_URL_TTL_SECONDS: ${MEDIA_UPLOAD_URL_TTL_SECONDS:-900}
  # Merchant notification channels (optional; log provider if unset).
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
  TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  EMAIL_FROM: ${EMAIL_FROM:-}
  # Chapa (commerce + platform subscription billing).
  CHAPA_SECRET_KEY: ${CHAPA_SECRET_KEY:-}
  CHAPA_API_URL: ${CHAPA_API_URL:-https://api.chapa.co/v1}
  CHAPA_FALLBACK_EMAIL: ${CHAPA_FALLBACK_EMAIL:-}
  # Worker: billing.reconcile-payments / billing.lifecycle schedules (ms; 0 = off).
  BILLING_RECONCILE_INTERVAL_MS: ${BILLING_RECONCILE_INTERVAL_MS:-300000}
  BILLING_LIFECYCLE_INTERVAL_MS: ${BILLING_LIFECYCLE_INTERVAL_MS:-3600000}

x-medusa-environment: &medusa-environment
  NODE_ENV: production
  SERVICE_NAME: medusa
  PORT: "9000"
  DATABASE_URL: ${MEDUSA_DATABASE_URL:?set MEDUSA_DATABASE_URL}
  DATABASE_SSL: ${MEDUSA_DATABASE_SSL:-false}
  REDIS_URL: redis://redis:6379
  STORE_CORS: https://*.${BASE_DOMAIN}
  ADMIN_CORS: https://dashboard.${BASE_DOMAIN}
  AUTH_CORS: https://dashboard.${BASE_DOMAIN}
  JWT_SECRET: ${MEDUSA_JWT_SECRET:?set MEDUSA_JWT_SECRET}
  COOKIE_SECRET: ${MEDUSA_COOKIE_SECRET:?set MEDUSA_COOKIE_SECRET}
  PLATFORM_INTERNAL_API_TOKEN: ${PLATFORM_INTERNAL_API_TOKEN}
  PLATFORM_API_INTERNAL_URL: http://platform-api:3000
  MEDUSA_WORKER_MODE: shared
  DISABLE_MEDUSA_ADMIN: "true"
  CHAPA_SECRET_KEY: ${CHAPA_SECRET_KEY:-}
  CHAPA_API_URL: ${CHAPA_API_URL:-https://api.chapa.co/v1}
  CHAPA_CALLBACK_URL: https://api.${BASE_DOMAIN}/platform/payments/chapa/callback
  CHAPA_RETURN_URL: https://shop.${BASE_DOMAIN}/checkout/payment-return
  CHAPA_CUSTOMIZATION_TITLE: ${CHAPA_CUSTOMIZATION_TITLE:-ECS Store}
  CHAPA_CUSTOMIZATION_DESCRIPTION: ${CHAPA_CUSTOMIZATION_DESCRIPTION:-Order payment}
  CHAPA_FALLBACK_EMAIL: ${CHAPA_FALLBACK_EMAIL:-payments@example.com}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ecs}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../compose/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    security_opt:
      - no-new-privileges:true

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ecs}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      # Browser uploads come from the dashboard origin; allow it for preflight.
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-https://dashboard.${BASE_DOMAIN}}
    volumes:
      - minio-data:/data
    expose:
      - "9000"
      - "9001"
    security_opt:
      - no-new-privileges:true

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 2; done;
        mc mb --ignore-existing "local/$${MINIO_BUCKET}";
        mc anonymous set download "local/$${MINIO_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ecs}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-ecs-media}
    security_opt:
      - no-new-privileges:true

  migrate-platform:
    image: ${IMAGE_PREFIX:?set IMAGE_PREFIX}/platform-api:${IMAGE_TAG:-main}
    pull_policy: always
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    environment: *platform-environment
    command:
      - timeout
      - -s
      - TERM
      - "180"
      - sh
      - -c
      - node --import tsx node_modules/@ecs/db/src/migrations.ts && node --import tsx src/sync-storefront-templates.ts
    depends_on:
      postgres:
        condition: service_healthy

  # Medusa discovers and manages module migration directories at runtime, so its
  # migration filesystem must be writable.
  migrate-medusa:
    image: ${IMAGE_PREFIX:?set IMAGE_PREFIX}/medusa:${IMAGE_TAG:-main}
    pull_policy: always
    restart: "no"
    read_only: false
    security_opt:
      - no-new-privileges:true
    environment: *medusa-environment
    command: ["timeout", "-s", "TERM", "180", "node_modules/.bin/medusa", "db:migrate"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  platform-api:
    <<: *app-defaults
    image: ${IMAGE_PREFIX:?set IMAGE_PREFIX}/platform-api:${IMAGE_TAG:-main}
    pull_policy: always
    environment: *platform-environment
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)throw Error(r.status)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    depends_on:
      migrate-platform:
        condition: service_completed_successfully
      medusa:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  platform-worker:
    <<: *app-defaults
    image: ${IMAGE_PREFIX:?set IMAGE_PREFIX}/platform-api:${IMAGE_TAG:-main}
    pull_policy: always
    environment:
      <<: *platform-environment
      SERVICE_NAME: platform-worker
      PLATFORM_DATABASE_POOL_MAX: ${PLATFORM_WORKER_DATABASE_POOL_MAX:-5}
    command: ["node", "--import", "tsx", "src/worker.ts"]
    depends_on:
      migrate-platform:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  medusa:
    <<: *app-defaults
    image: ${IMAGE_PREFIX:?set IMAGE_PREFIX}/medusa:${IMAGE_TAG:-main}
    pull_policy: always
    read_only: false
    environment: *medusa-environment
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:9000/health').then(r=>{if(!r.ok)throw Error(r.status)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    depends_on:
      migrate-medusa:
        condition: service_completed_successfully

  dashboard:
    <<: *app-defaults
    image: ${IMAGE_PREFIX:?set IMAGE_PREFIX}/dashboard:${IMAGE_TAG:-main}
    pull_policy: always
    environment:
      NODE_ENV: production
      PORT: "3001"
      PLATFORM_API_BASE_URL: http://platform-api:3000
      DASHBOARD_PUBLIC_BASE_URL: https://dashboard.${BASE_DOMAIN}
      DASHBOARD_AUTH_COOKIE_DOMAIN: .${BASE_DOMAIN}
      # Must match platform-api BETTER_AUTH_COOKIE_PREFIX (session clear / current session).
      BETTER_AUTH_COOKIE_PREFIX: ${BETTER_AUTH_COOKIE_PREFIX:-ecs}
      STOREFRONT_PUBLIC_BASE_DOMAIN: ${BASE_DOMAIN}
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/').then(r=>{if(r.status>=500)throw Error(r.status)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      platform-api:
        condition: service_healthy

  storefront:
    <<: *app-defaults
    image: ${IMAGE_PREFIX:?set IMAGE_PREFIX}/storefront:${IMAGE_TAG:-main}
    pull_policy: always
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "4321"
      PLATFORM_API_BASE_URL: http://platform-api:3000
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /app/.astro:size=16m,mode=1777
    expose:
      - "4321"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4321/healthz').then(r=>{if(!r.ok)throw Error(r.status)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    depends_on:
      platform-api:
        condition: service_healthy

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    read_only: true
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    tmpfs:
      - /config:size=8m
      - /data:size=8m
    expose:
      - "80"
    networks:
      - default
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.services.ecs-caddy.loadbalancer.server.port=80
      - traefik.http.routers.ecs-caddy-http.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.${BASE_DOMAIN}`)
      - traefik.http.routers.ecs-caddy-http.ruleSyntax=v2
      - traefik.http.routers.ecs-caddy-http.entrypoints=web
      - traefik.http.routers.ecs-caddy-http.middlewares=ecs-caddy-https-redirect
      - traefik.http.routers.ecs-caddy-http.service=ecs-caddy
      - traefik.http.middlewares.ecs-caddy-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.ecs-caddy-https-redirect.redirectscheme.permanent=true
      - traefik.http.routers.ecs-caddy-https.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.${BASE_DOMAIN}`)
      - traefik.http.routers.ecs-caddy-https.ruleSyntax=v2
      - traefik.http.routers.ecs-caddy-https.entrypoints=websecure
      - traefik.http.routers.ecs-caddy-https.tls=true
      - traefik.http.routers.ecs-caddy-https.service=ecs-caddy
      - traefik.http.routers.ecs-caddy-demo-certs.rule=Host(`dashboard.${BASE_DOMAIN}`) || Host(`api.${BASE_DOMAIN}`) || Host(`shop.${BASE_DOMAIN}`) || Host(`media.${BASE_DOMAIN}`)
      - traefik.http.routers.ecs-caddy-demo-certs.entrypoints=websecure
      - traefik.http.routers.ecs-caddy-demo-certs.priority=100
      - traefik.http.routers.ecs-caddy-demo-certs.tls=true
      - traefik.http.routers.ecs-caddy-demo-certs.tls.certresolver=letsencrypt
      - traefik.http.routers.ecs-caddy-demo-certs.service=ecs-caddy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
    security_opt:
      - no-new-privileges:true
    depends_on:
      dashboard:
        condition: service_healthy
      storefront:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  dokploy-network:
    external: true
