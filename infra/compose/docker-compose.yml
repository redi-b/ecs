name: ecs

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ecs
      POSTGRES_PASSWORD: ecs
      POSTGRES_DB: ecs
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecs -d ecs"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  # S3-compatible media store (SeaweedFS). App still uses MEDIA_S3_* only.
  seaweedfs:
    image: chrislusf/seaweedfs:4.00
    hostname: seaweedfs
    entrypoint: ["/bin/sh", "/seaweedfs-entrypoint.sh"]
    environment:
      S3_BUCKET: ${MEDIA_S3_BUCKET:-ecs-media}
      SEAWEED_IP: seaweedfs
      # Dev: allow every origin (shops use dynamic *.lvh.me hosts).
      S3_ALLOWED_ORIGINS: ${MEDIA_S3_CORS_ALLOW_ORIGIN:-*}
    ports:
      # Keep host :9002 so existing MEDIA_S3_ENDPOINT=http://localhost:9002 still works.
      - "${MEDIA_S3_HOST_PORT:-9002}:8333"
      # Optional filer UI for debugging (was MinIO console :9003).
      - "${SEAWEED_FILER_HOST_PORT:-9003}:8888"
    volumes:
      - seaweed-data:/data
      - ./seaweedfs/entrypoint.sh:/seaweedfs-entrypoint.sh:ro
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8333/"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  caddy:
    image: caddy:2.10-alpine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  seaweed-data:
  caddy-data:
  caddy-config:
