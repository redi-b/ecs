name: ecs

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ecs
      POSTGRES_PASSWORD: ecs
      POSTGRES_DB: ecs
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecs -d ecs"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ecs}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ecs-media-development}
      # Development default accepts every origin because shops use dynamic *.lvh.me hosts.
      # Production deployments must override this with their exact dashboard origins.
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-*}
    ports:
      - "${MINIO_API_HOST_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9003}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      # MinIO image ships curl; ready when the API answers.
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot bucket bootstrap. Do NOT include this service in `up --wait` —
  # compose treats a successful exit as failure for waited services.
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 2; done;
        mc mb --ignore-existing "local/$${MINIO_BUCKET}";
        mc anonymous set download "local/$${MINIO_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ecs}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ecs-media-development}
      MINIO_BUCKET: ${MINIO_BUCKET:-ecs-media}

  caddy:
    image: caddy:2.10-alpine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:
