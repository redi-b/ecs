name: Build container images

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: Trigger Dokploy after pushing the images
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure image metadata
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          image_tag="${GITHUB_REF_NAME,,}"
          image_tag="${image_tag//\//-}"
          echo "IMAGE_PREFIX=ghcr.io/${repository}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${image_tag}" >> "$GITHUB_ENV"
          echo "GIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images
        uses: docker/bake-action@v6
        with:
          files: infra/docker/docker-bake.hcl
          push: ${{ github.event_name != 'pull_request' }}

      - name: Trigger Dokploy deployment
        if: github.event_name == 'push' || inputs.deploy
        env:
          DOKPLOY_API_URL: ${{ secrets.DOKPLOY_API_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: node scripts/trigger-dokploy.mjs
